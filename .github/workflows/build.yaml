---
# The workflow to deploy snapshot artifact versions to GitHub packages
# Fill free to adjust java version and additional mvn command-line parameters
# The workflow will trigger on pushes into branches different from main and release
# Please make sure that the version in the pom.xml file has the SNAPSHOT postfix

name: Maven build

on:
  pull_request:
    branches:
    - '**'
    paths-ignore:
      - "docs/**"
      - "*.md"
  push:
    branches-ignore:
      - "main"
      - "**release*"
      - "prettier/**"
      - "dependabot/**"
    paths-ignore:
      - "docs/**"
      - "*.md"
  workflow_dispatch: {}

permissions: {}

concurrency:
  group: maven-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mvn-snapshot-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Deploy Maven Snapshot
        uses: netcracker/qubership-workflow-hub/actions/maven-snapshot-deploy@8c6dbeb901920bae9f40d7d7b646d8d9127e1ce7 # v2.4.0
        with:
          java-version: "21"
          maven-version: "3.9.10"
          maven-command: ${{ github.event_name == 'pull_request' && 'install' || 'deploy' }}
          additional-mvn-args: >-
            ${{
              github.event_name == 'pull_request' &&
              '' ||
              '-DaltDeploymentRepository=github::https://maven.pkg.github.com/Netcracker/qubership-graylog-archiving-plugin'
            }}
          target-store: "github"
          maven-username: ${{ github.actor }}
          maven-token: ${{ github.token }}
          gpg-passphrase: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
